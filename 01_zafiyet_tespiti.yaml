---
- name: Job Template 1 - Zafiyet Taraması ve Detaylı HTML Raporu Üretimi
  hosts: all
  become: yes
  tasks:
    - name: Trivy ile detaylı tarama yap ve JSON olarak kaydet
      command: trivy fs / --scanners vuln --format json -q --output /tmp/trivy-report.json
      ignore_errors: yes

    - name: Her sunucunun JSON raporunu AWX/Kontrol Makinesine çek
      fetch:
        src: /tmp/trivy-report.json
        dest: "/tmp/trivy_reports/{{ inventory_hostname }}.json"
        flat: yes

    - name: Tüm verileri birleştirip Detaylı HTML Raporunu Oluştur
      template:
        src: rapor_sablonu.j2
        dest: /tmp/trivy_reports/Guncel_Zafiyet_Raporu.html
      delegate_to: localhost
      run_once: true # Bu adım sadece bir kere, tüm sunucuların verisi geldikten sonra çalışır.