---
- name: Job Template 0 - Altyapı ve Bağımlılıkların Kurulumu
  hosts: hedef_sunucular
  become: yes
  gather_facts: yes
  tasks:
    # ==========================================
    # 1. TEMEL BAĞIMLILIKLAR
    # ==========================================
    - name: (Debian/Ubuntu) İsimleri asla değişmeyen ortak paketleri kur
      apt:
        name:
          - wget
          - apt-transport-https
          - gnupg
          - jq
          - needrestart
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    # ==========================================
    # 2. BASH İLE SESSİZ VE KESİN OPENSCAP KURULUMU
    # ==========================================
    - name: (Debian/Ubuntu) OpenSCAP'i terminal üzerinden kaba kuvvetle kur
      shell: |
        # Tüm olası OpenSCAP paket isimlerini sessizce dene
        for pkg in openscap-scanner libopenscap8 openscap-utils; do
          apt-get install -y $pkg >/dev/null 2>&1 || true
        done
      args:
        executable: /bin/bash
      when: ansible_os_family == "Debian"

    # ==========================================
    # 3. KURULUM KANITI (SAĞLAMA)
    # ==========================================
    - name: (Debian/Ubuntu) oscap aracının kurulduğunu doğrula
      command: oscap --version
      register: oscap_check
      changed_when: false
      when: ansible_os_family == "Debian"

    - name: (Debian/Ubuntu) Kurulum Sonucunu Ekrana Bas
      debug:
        msg: "Başarılı! Kurulan OpenSCAP Versiyonu: {{ oscap_check.stdout_lines[0] }}"
      when: ansible_os_family == "Debian"

    # ==========================================
    # REDHAT, CENTOS & ROCKY AİLESİ
    # ==========================================
    - name: (RedHat/CentOS) Temel bağımlılıkları ve OpenSCAP'i kur
      yum:
        name:
          - wget
          - jq
          - yum-utils
          - openscap-scanner
        state: present
      when: ansible_os_family == "RedHat"