---
- name: Job Template 0 - Altyapı ve Bağımlılıkların Kurulumu
  hosts: hedef_sunucular
  become: yes
  gather_facts: yes
  tasks:
    # ==========================================
    # DEBIAN & UBUNTU AİLESİ
    # ==========================================
    - name: (Debian/Ubuntu) Universe reposunu zorla aç (Paketler burada gizli)
      command: add-apt-repository universe -y
      ignore_errors: yes
      when: ansible_os_family == "Debian"

    - name: (Debian/Ubuntu) Paket listelerini güncelle
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: (Debian/Ubuntu) İsimleri sabit olan temel paketleri kur
      apt:
        name:
          - wget
          - apt-transport-https
          - gnupg
          - jq
          - needrestart
        state: present
      when: ansible_os_family == "Debian"

    - name: (Debian/Ubuntu) İnatçı OpenSCAP paketlerini kaba kuvvetle dene (Olmayanı atla!)
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - libopenscap8       # 22.04 bunu kurup diğerini atlayacak
        - openscap-scanner   # 24.04 bunu kurup diğerini atlayacak
      ignore_errors: yes
      when: ansible_os_family == "Debian"

    # ==========================================
    # REDHAT, CENTOS & ROCKY AİLESİ
    # ==========================================
    - name: (RedHat/CentOS) Temel bağımlılıkları ve OpenSCAP'i kur
      yum:
        name:
          - wget
          - jq
          - yum-utils
          - openscap-scanner
        state: present
      when: ansible_os_family == "RedHat"