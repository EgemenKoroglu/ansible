---
- name: Job Template 1 - Zafiyet Taraması ve Merkezi HTML Raporlama
  hosts: all
  become: yes
  tasks:
    - name: Trivy HTML Raporunu Alt Sunucuda Oluştur
      shell: trivy fs / --scanners vuln --format template --template "@contrib/html.tpl" -o /tmp/zafiyet_raporu.html
      ignore_errors: yes

    - name: Oluşturulan Raporu AWX Ana Sunucusuna Çek (Fetch)
      fetch:
        src: /tmp/zafiyet_raporu.html
        dest: /opt/trivy_raporlar/
        flat: no