---
- name: Trivy OS Zafiyet Taraması ve Nginx Raporlama
  hosts: hedef_sunucular
  gather_facts: no
  become: yes
  tasks:
    - name: Trivy HTML şablonunu indir
      get_url:
        url: https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl
        dest: /tmp/html.tpl
        validate_certs: no

    - name: Trivy ile sadece OS taraması yap ve rapor oluştur
      shell: trivy rootfs / --vuln-type os --scanners vuln --severity HIGH,CRITICAL --format template --template "@/tmp/html.tpl" -o /tmp/{{ inventory_hostname }}_zafiyet.html

    - name: Raporu ana sunucuya (Nginx) kopyala
      copy:
        src: /tmp/{{ inventory_hostname }}_zafiyet.html
        dest: /var/www/html/raporlar/{{ inventory_hostname }}_zafiyet.html
      delegate_to: 172.30.11.11
      become: false