---
- name: Otomatik OS Yamalama
  hosts: hedef_sunucular
  become: yes
  gather_facts: yes
  tasks:
    - name: Ön Hazırlık - JQ paketini kur
      apt:
        name: jq
        state: present
      when: ansible_os_family == "Debian"

    - name: Güncellenecek zafiyetli OS paket listesini belirle
      shell: |
        trivy rootfs / --vuln-type os --scanners vuln --severity HIGH,CRITICAL --format json -q | \
        jq -r '.Results[]? | select(.Class == "os-pkgs") | .Vulnerabilities[]? | select(.FixedVersion != null and .FixedVersion != "") | .PkgName' | \
        sort -u
      register: target_packages
      ignore_errors: yes

    - name: (Debian/Ubuntu) Zafiyetli paketleri yamala
      apt:
        name: "{{ target_packages.stdout_lines }}"
        state: latest
        only_upgrade: yes
        update_cache: yes
      when: ansible_os_family == "Debian" and target_packages.stdout_lines | length > 0
      register: apt_patch_results

    - name: (Debian/Ubuntu) Gerekli servisleri yeniden başlat
      command: needrestart -r a
      when: ansible_os_family == "Debian" and apt_patch_results.changed
      ignore_errors: yes
      
    - name: (Debian/Ubuntu) Kernel reboot kontrolü
      stat:
        path: /var/run/reboot-required
      register: ubuntu_reboot_status
      when: ansible_os_family == "Debian"

    - name: (Debian/Ubuntu) Sisteme reboot at
      reboot:
        msg: "Güvenlik yamaları sonrası otomatik reboot"
        connect_timeout: 5
        reboot_timeout: 300
      when: ansible_os_family == "Debian" and ubuntu_reboot_status.stat.exists | default(false)