---
- name: Otomatik OS Yamalama ve Kesin Yeniden Başlatma
  hosts: hedef_sunucular
  become: yes
  gather_facts: yes
  tasks:
    - name: Ön Hazırlık - JQ ve Needrestart paketlerini kur
      apt:
        name: 
          - jq
          - needrestart
        state: present
      when: ansible_os_family == "Debian"

    - name: Güncellenecek zafiyetli OS paket listesini belirle
      shell: |
        trivy rootfs / --vuln-type os --scanners vuln --severity HIGH,CRITICAL --format json -q | \
        jq -r '.Results[]? | select(.Class == "os-pkgs") | .Vulnerabilities[]? | select(.FixedVersion != null and .FixedVersion != "") | .PkgName' | \
        sort -u
      register: target_packages
      ignore_errors: yes

    - name: (Debian/Ubuntu) Zafiyetli paketleri yamala
      apt:
        name: "{{ target_packages.stdout_lines }}"
        state: latest
        only_upgrade: yes
        update_cache: yes
      when: ansible_os_family == "Debian" and target_packages.stdout_lines | length > 0
      register: apt_patch_results

    - name: (Debian/Ubuntu) Sistemin yeniden başlatmaya ihtiyacı var mı kontrol et
      command: needrestart -r l  # -r l modu: Sadece gerekliyse yeniden başlatma listesini verir
      register: reboot_required_check
      changed_when: false
      failed_when: false
      when: ansible_os_family == "Debian" and apt_patch_results.changed

    - name: (Debian/Ubuntu) Eğer Kernel veya kritik kütüphane güncellendiyse sistemi yeniden başlat
      reboot:
        msg: "Güvenlik yamaları (Kernel/Lib) sonrası otomatik sistem yeniden başlatması"
        connect_timeout: 5
        reboot_timeout: 300
      # Buradaki mantık: apt işlem yaptıysa ve needrestart bir reboot öneriyorsa restart at
      when: >
        ansible_os_family == "Debian" and 
        apt_patch_results.changed and 
        (reboot_required_check.stdout is search("reboot required") or ansible_local.reboot_required | default(false))