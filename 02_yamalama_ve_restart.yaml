---
- name: Otomatik OS Yamalama ve Kesin Yeniden Başlatma
  hosts: hedef_sunucular
  become: yes
  gather_facts: yes
  tasks:
    - name: Ön Hazırlık - JQ ve Needrestart paketlerini kur
      apt:
        name: 
          - jq
          - needrestart
        state: present
      when: ansible_os_family == "Debian"

    - name: Güncellenecek zafiyetli OS paket listesini belirle
      shell: |
        trivy rootfs / --vuln-type os --scanners vuln --severity HIGH,CRITICAL --format json -q | \
        jq -r '.Results[]? | select(.Class == "os-pkgs") | .Vulnerabilities[]? | select(.FixedVersion != null and .FixedVersion != "") | .PkgName' | \
        sort -u
      register: target_packages
      ignore_errors: yes

    - name: (Debian/Ubuntu) Zafiyetli paketleri yamala
      apt:
        name: "{{ target_packages.stdout_lines }}"
        state: latest
        only_upgrade: yes
        update_cache: yes
      when: ansible_os_family == "Debian" and target_packages.stdout_lines | length > 0
      register: apt_patch_results

    - name: (Debian/Ubuntu) Sistemin yeniden başlatmaya ihtiyacı var mı kontrol et (Dosyayı yakala)
      stat:
        path: /var/run/reboot-required
      register: reboot_file_status
      when: ansible_os_family == "Debian"

    - name: (Debian/Ubuntu) Gerekliyse sistemi yeniden başlat
      reboot:
        msg: "Sistem güncellemeleri veya Kernel değişikliği sonrası yeniden başlatma"
        connect_timeout: 5
        reboot_timeout: 300
      when: ansible_os_family == "Debian" and reboot_file_status.stat.exists