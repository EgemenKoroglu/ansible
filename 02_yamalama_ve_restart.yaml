---
- name: Profesyonel Ubuntu OS Patching
  hosts: hedef_sunucular
  become: yes
  tasks:
    - name: Paket listesini güncelle ve güvenlik yamalarını uygula
      apt:
        update_cache: yes
        upgrade: dist # Sadece güvenlik ve kritik yamaları yapar
        autoremove: yes
      register: apt_update_status

    - name: Reboot gerekip gerekmediğini kontrol et
      stat:
        path: /var/run/reboot-required
      register: reboot_status

    - name: Sistem reboot gerektiriyorsa yeniden başlat
      reboot:
        msg: "Güvenlik yamaları sonrası sistem yeniden başlatılıyor."
        connect_timeout: 5
        reboot_timeout: 300
      when: reboot_status.stat.exists