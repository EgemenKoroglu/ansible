---
- name: Otomatik Güvenlik Yamaları ve Sistem Güncellemesi
  hosts: all
  become: yes
  tasks:
    - name: APT önbelleğini güncelle ve tüm paketleri en son sürüme yükselt (dist-upgrade)
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Sistemin yeniden başlatılmaya ihtiyacı olup olmadığını kontrol et
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Eğer çekirdek güncellendiyse sunucuyu güvenle yeniden başlat
      ansible.builtin.reboot:
        msg: "Ansible AWX tarafından güvenlik yamaları sonrası otomatik yeniden başlatma işlemi."
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: uptime
      when: reboot_required_file.stat.exists