---
- name: Job Template 0 - Altyapı ve Bağımlılıkların Kurulumu
  hosts: hedef_sunucular
  become: yes
  tasks:
    - name: (Debian/Ubuntu) Paket yoksa HİÇBİR ŞEKİLDE hata vermeyen sessiz kurulum
      shell: |
        apt-get install -y openscap-scanner > /dev/null 2>&1 || true
        apt-get install -y libopenscap8 > /dev/null 2>&1 || true
      args:
        executable: /bin/bash
      when: ansible_os_family == "Debian"