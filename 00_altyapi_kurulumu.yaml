# Güncellenmiş Job 0 - OpenSCAP Kurulumu
---
- name: Job Template 0 - Altyapı ve Bağımlılıkların Kurulumu
  hosts: hedef_sunucular
  become: yes
  gather_facts: yes
  tasks:
    # ==========================================
    # DEBIAN & UBUNTU AİLESİ (22.04 ve 24.04 Destekli)
    # ==========================================
    - name: (Debian/Ubuntu) Universe repository'sini aktif et (OpenSCAP bu depodadır)
      apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu/ {{ ansible_distribution_release }} universe"
        state: present
      when: ansible_os_family == "Debian"

    - name: (Debian/Ubuntu) Ortak temel bağımlılıkları kur
      apt:
        name:
          - wget
          - apt-transport-https
          - gnupg
          - jq
          - needrestart
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: (Ubuntu 22.04) Eski sürüm OpenSCAP paketlerini kur
      apt:
        name:
          - libopenscap8
          - openscap-utils
        state: present
      when: ansible_os_family == "Debian" and ansible_distribution_version == "22.04"

    - name: (Ubuntu 22.04) Eski sürüm OpenSCAP paketlerini kur
      apt:
        name:
          - libopenscap8
        state: present
      when: ansible_os_family == "Debian" and ansible_distribution_version == "22.04"
      
    # ==========================================
    # REDHAT, CENTOS & ROCKY AİLESİ
    # ==========================================
    - name: (RedHat/CentOS) Temel bağımlılıkları ve OpenSCAP'i kur
      yum:
        name:
          - wget
          - jq
          - yum-utils
          - openscap-scanner
        state: present
      when: ansible_os_family == "RedHat"